version: '3.8'

services:

  postgres_dw:
    image: postgres:15
    command: >
      bash -c "ln -sf Ho_Chi_Minh /usr/share/zoneinfo/Asia/Saigon 2>/dev/null; 
              docker-entrypoint.sh postgres"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
    networks:
      - airflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${AIRFLOW_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - airflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.0-python3.10
    entrypoint: /bin/bash
    command:
      - -c
      - |
        apt-get update && apt-get install -y netcat
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R 50000:50000 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        echo "Waiting for PostgreSQL..."
        until nc -z airflow-postgres 5432; do sleep 2; done
        echo "Running migration..."
        exec /entrypoint airflow db migrate
    environment:
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
      _UID: 50000
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    volumes:
      - ./:/opt/airflow
    networks:
      - airflow-network
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-webserver:
    image: apache/airflow:2.8.0-python3.10
    user: "${AIRFLOW_UID:-50000}:0"  
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid &&
              pip install -r /requirements.txt &&
              airflow connections add 'postgres_dw' --conn-type 'postgres' --conn-host 'postgres_dw' --conn-schema '${POSTGRES_DB}' --conn-login '${POSTGRES_USER}' --conn-password '${POSTGRES_PASSWORD}' --conn-port '5432' 2>/dev/null || true &&
              airflow webserver"
    ports:
      - "8080:8080"
    environment:
      EXECUTOR: Local
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs 
      - ./requirements.txt:/requirements.txt
      - ./dags:/opt/airflow/dags:cached
      - ./logs:/opt/airflow/logs:cached 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-postgres:
        condition: service_healthy
    networks:
      - airflow-network

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.10
    user: "${AIRFLOW_UID:-50000}:0"  
    command: >
      bash -c "rm -f /opt/airflow/airflow-scheduler.pid &&
              pip install -r /requirements.txt &&
              airflow scheduler"
    environment:
      EXECUTOR: Local
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_USER}:${AIRFLOW_PASSWORD}@airflow-postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs 
      - ./requirements.txt:/requirements.txt
      - ./dags:/opt/airflow/dags:cached
      - ./logs:/opt/airflow/logs:cached 
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    networks:
      - airflow-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase
      TZ: UTC
      JAVA_TIMEZONE: UTC
    volumes:
      - metabase_data:/metabase-data
    networks:
      - airflow-network
    depends_on:
      - postgres_dw
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_dw_data:
  postgres_airflow_data:
  metabase_data:

networks:
  airflow-network:
    driver: bridge
